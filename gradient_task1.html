<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>

body{
    background:white;
    
}

div{
    height: 200px;
    width:500px;
    margin-top: 10%;
    padding:100px;
    border-radius:100px;

    background-image: linear-gradient(to right, red, purple, blue);
}

td{
    color:white;
    font-size:20px;
    width:120px;
}

input{
    width:220px;
    height:30px;
    margin:10px;
}

button{
    height: 40px;
    width: 100px;
    border-radius:10px;
    border:2px solid black;
    margin-top:10px;
    background-image:linear-gradient(to right,rgb(7, 250, 7),rgb(236, 62, 243));
}



</style>
</head>
<body>
<center>
<div>
    <table>
        <tr>
            <td>Name:</td>
            <td><input type="text"></td>
        </tr>
        <tr>
            <td>Password:</td>
            <td><input type="password"></td>
        </tr>
        <tr>
            <td>
        <button >Submit</button></td>
        <td><button >Cancel</button></td>
        </tr>
    </table>
</div>
</center>
</body>
</html>
