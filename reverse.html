<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <p id="demo"></p>

    <script>
        let num=1234;
        let rev=0;
        while(num>0){
            let last= num %10;
            rev=rev*10+last;
            num=Math.floor(num/10);

        }
        document.getElementById("demo").innerHTML=rev;
    </script>
</body>
</html>
