<!DOCTYPE html>
<html>
<body>

<p id="demo"></p>

<script>
let n = 5;
let pattern = "";

for (let i = n; i >= 1; i--) {

  
  for (let j = 1; j <= n - i; j++) {
    pattern += "&nbsp;";
  }

  
  for (let k = 1; k <= (2 * i - 1); k++) {
    pattern += "*";
  }

  pattern += "<br>";
}

document.getElementById("demo").innerHTML = pattern;
</script>

</body>
</html>
