<!DOCTYPE html>
<html>
<head>
  <title>Document</title>
</head>
<body>

<h3>inverted right half pyramid</h3>
<p id="demo"></p>

<script>
  let n = 5;
  let pattern = "";

  for (let i = n; i >= 1; i--) {
    for (let j = 1; j <= i; j++) {
      pattern += "*";
    }
    pattern += "<br>";
  }

  document.getElementById("demo").innerHTML = pattern;
</script>

</body>
</html>
