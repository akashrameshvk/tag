<!DOCTYPE html>
<html>
<body>

<h2>While Pyramid</h2>
<p id="demo"></p>

<script>
let text = "";
let n = 5;
let i = 1;

while (i <= n) {
    let s = n - i;
    

   
    while (s > 0) {
        text += "&nbsp  ";
        s--;
    }
    let j = 1;
   
    while (j <= (2 * i - 1)) {
        text += " * ";
        j++;
    }

    text += "<br>";
    i++;
}

document.getElementById("demo").innerHTML = text;
</script>

</body>
</html>
