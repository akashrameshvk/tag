<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
</head>
<body>
    <button>click to fadeto</button><br><br>
    <div id="div1" style="width: 100px; height: 100px; background-color: rgb(13, 255, 0);"></div><br><br>
    <div id="div2" style="width: 100px; height: 100px;background-color: rgb(0, 242, 255);"></div><br><br>
    <div id="div3" style="width: 100px; height: 100px; background-color: rgb(6, 6, 6);"></div><br><br>
</body>
<script>
    $(document).ready(function(){
        $("button").click(function(){

            $("#div1").fadeTo("slow",0.1);
            $("#div2").fadeTo("slow",0.3);
            $("#div3").fadeTo("slow",0.5);


        });

    });
</script>
</html>
