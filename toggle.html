<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
</head>
<body>
    <button>click to toggle effect</button><br><br>
    <div id="div1" style="width: 100px; height: 100px; background-color: rgb(255, 0, 212);"></div><br><br>
    <div id="div2" style="width: 100px; height: 100px;background-color: rgb(0, 255, 221);"></div><br><br>
    <div id="div3" style="width: 100px; height: 100px; background-color: rgba(246, 255, 0, 0.504);"></div><br><br>
</body>
<script>
    $(document).ready(function(){
        $("button").click(function(){

            $("#div1").fadeToggle();
            $("#div2").fadeToggle("slow");
            $("#div3").fadeToggle(3000);


        });

    });
</script>
</html>
