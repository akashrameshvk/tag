<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
    <script src="https://code.jquery.com/ui/1.13.2/jquery-ui.min.js"></script>


    
</head>

    <button >start animate</button>
    <div style="background-color: red;height: 100px;width: 100px;position: absolute; text-align: center;"><b>HALLO</b></div>
        


    
</body>
<script>


    $(document).ready(function(){
        $("button").click(function(){
            $("div").animate({
                left:'550px',
                color:'yellow',
                top:'100px',
                width:'400px',
                height:'500px',
                backgroundColor:'green',
                borderRadius:'50px'
                

            });

           
        });
       
            
        });
        $(document).ready(function(){
        $("button").click(function(){
            $("div").animate({
                right:'550px',
                color:'red',
                top:'100px',
                width:'400px',
                height:'200px',
                backgroundColor:'black',
                borderRadius:'50px'
                

            });

           
        });
       
            
        });


    
</script>


</html>
