<html lang="en">
<head>

                    <select name="" id="">

                        <option value="">Kozhikode</option>
                        <option value="">Kannur</option>

                    </select>
                </td>

            </tr>
            <tr>
                <td>Photo</td>

            </tr>
            <tr>
                <td>Address</td>

            </tr>
            <tr>
                <td><input type="submit"> <button>Cancel</button></td>
                
            </tr>
        </table>
    </form>
