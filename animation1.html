<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        div{
            height: 250px;
            width: 300px;
            background-color: chartreuse;
            animation-name: op;
            animation-duration: 10s;
        }
        @keyframes op{
            0%{ background-color:blue;}
            10%{background-color: black;}
            15%{background-color: red;}
            20%{background-color: aqua;}
            25%{background-color: brown;}
            30%{background-color: cornsilk;}
            40%{background-color: deeppink;}
            45%{background-color: darkolivegreen;}
            50%{background-color: gold;}
            55%{background-color: lime;}
            65%{background-color: maroon;}
            85%{background-color: yellow;}
            100%{background-color: forestgreen;}

        }
    </style>
</head>
<body>
    <div></div>
</body>
</html>
