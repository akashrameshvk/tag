<!DOCTYPE html>
<html>
<body>

<p id="demo"></p>

<script>
let n = 5;
let pattern = "";

for (let i = 0; i < n; i++) {

  
  for (let j = 0; j < n - i; j++) {
    pattern += "&nbsp;&nbsp;";
  }

  let num = 1;


  for (let k = 0; k <= i; k++) {
    pattern += num + "&nbsp;&nbsp;";
    num = num * (i - k) / (k + 1);
  }

  pattern += "<br>";
}

document.getElementById("demo").innerHTML = pattern;
</script>

</body>
</html>
