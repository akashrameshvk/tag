<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>

*{
    margin: 0px;
    padding: 0px;
    box-sizing: border-box;
}

body{
    margin: 50px;
}
.grig{
    max-width: 900px;
    margin: auto;
    background-color: pink;
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    grid-template-rows: 2fr 2fr 2fr;
    grid-column: repeat(3,1fr 1fr 1fr);
    grid-auto-rows: 200px;
    /* grid-column-gap: 30px;
    grid-row-gap: 30px; */
    grid-gap: 30px;




}

.iteam{
    /* grid-column-start: 1;
    grid-column-end: 2; */
    background-color: aqua;
    /* grid-row-start: 2;
    grid-row-end: 3; */
    grid-area:2/2/3/3;
}

    </style>
</head>
<body>
    <div class="grig">
    <div class="iteam">1</div>
    <div>2</div>
    <div>3</div>
    <div>4</div>
    <div>5</div>
    <div>6</div>
    <div>7</div>
    <div>8</div>
    <div>9</div>
    </div>
</body>
</html>
