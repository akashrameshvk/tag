<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Form in Table</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<h3 style="text-align: center;margin-top: 10px;color: brown;">NEW REGISTRATION</h3>
<div class="container mt-5">
  <table class="table table-bordered">
    
    <tr>
      <td>NAME</td>
      <td><input class="form-control" type="text" placeholder="Name"></td>
    </tr>

    <tr>
      <td>PHONE NO</td>
      <td><input class="form-control" type="text" placeholder="Number"></td>
    </tr>

    <tr>
      <td>ADDRESS</td>
      <td>
        <textarea class="form-control" rows="3"></textarea>
      </td>
    </tr>

    <tr>
      <td>EMAIL</td>
      <td>
        <input type="email" class="form-control" placeholder="Email">
      </td>
    </tr>

    <tr>
      <td>UPLOAD IMAGE</td>
      <td>
        <input class="form-control" type="file">
      </td>
    </tr>

    <tr>
      <td>EDUCATION</td>
      <td>
        <select class="form-select">
          <option selected>Choose</option>
          <option>MASTER</option>
          <option>BACHELOR</option>
          <option>HIGHER SECONDARY</option>
        </select>
      </td>
    </tr>

    <tr>
      <td>GENDER</td>
      <td>
        <div class="form-check">
          <input class="form-check-input" type="radio" name="gender">
          <label class="form-check-label">MALE</label>
        </div>

        <div class="form-check">
          <input class="form-check-input" type="radio" name="gender">
          <label class="form-check-label">FEMALE</label>
        </div>
      </td>
    </tr>

    <tr>
      <td colspan="2" class="text-center">
        <button class="btn btn-primary">Submit</button>
        <button class="btn btn-secondary">Clear</button>
      </td>
    </tr>

  </table>
</div>
<nav aria-label="Page navigation example" >
  <ul class="pagination d-flex justify-content-center">

    <li class="page-item"><a class="page-link" href="#">2</a></li>
    <li class="page-item"><a class="page-link" href="#">3</a></li>
    <li class="page-item"><a class="page-link" href="#">Next</a></li>
  </ul>
</nav>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
